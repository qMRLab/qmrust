model: inversion_recovery

# Protocol — non-BIDS fallback only.
# Under `fit --bids-dir`, InversionTime (and RepetitionTime) come from the JSON
# sidecars via the model's protocol_schema(), and the values below are ignored.
# They are used for `fit --mat-*` / NIfTI input (no sidecars), and by `bidsify`
# when stamping sidecars. All times are in seconds (BIDS/SI).
inversion_times:
- 0.350
- 0.500
- 0.650
- 0.800
- 0.950
- 1.100
- 1.250
- 1.400
- 1.700
repetition_time: 2.5

# Algorithm options (always used; not BIDS metadata).
method: magnitude
t1_range:
  start: 0.001
  stop: 5.0
  step: 0.001
zoom:
  iterations: 2
  points: 21

# BIDS mask selection — applies to `fit --bids-dir` only; `--mat-*` uses --mask.
mask:
  desc: brain
