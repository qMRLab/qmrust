model: mt_sat

# BIDS input: each MTS role's FlipAngle and RepetitionTimeExcitation come from
# its JSON sidecar (via the model's protocol_schema), so the per-role
# acquisition is NOT declared here.

# TardifLab B1 correction: `fitvalues` names the artifact produced by
# `qmrust mtsat-b1 --seq recipes/mtsat_b1_seq.yaml --bids-dir <ds> --out
# fitvalues.yaml`; `b1_ref` (µT) here is the nominal saturation-pulse B1 the
# artifact is expected to have been built at, checked only as a sanity guard —
# the artifact's own `b1_ref` is authoritative and is what is actually used. A
# mismatch is reported as a warning, not an error. The CLI resolves and inlines
# the artifact before the model is built, so this path form never reaches the
# core. When present, this correction is used instead of the empirical Helms
# `b1_correction_factor` below.
b1_correction:
  fitvalues: fitvalues.yaml
  b1_ref: 6.8

export_mtr: true

# BIDS mask selection — disambiguates which mask to apply. If the dataset has
# no matching mask, no masking is applied.
mask:
  desc: brain
